<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TIRESIA — Fragments of Light</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Noto+Serif+SC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Serif SC', Georgia, serif;
    color: #3a2a3e;
    min-height: 100vh;
    background: #f5f0eb;
    background-image: url('./bg.jpg');
    background-size: cover;
    background-position: center top;
    background-attachment: fixed;
    background-repeat: no-repeat;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background: rgba(245,240,235,0.55);
    backdrop-filter: blur(2px); -webkit-backdrop-filter: blur(2px);
    z-index: 0; pointer-events: none;
  }

  #app {
    position: relative; z-index: 1;
    max-width: 720px; margin: 0 auto; padding: 0 20px 60px;
  }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(18px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes shimmer {
    0% { background-position: -200% center; }
    100% { background-position: 200% center; }
  }
  @keyframes float {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }
  @keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:1} }

  /* ─── Lock Screen ─── */
  .lock-screen {
    position: fixed; inset: 0; z-index: 9999;
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    background: #0c0b0f;
    background-image: url('./bg.jpg');
    background-size: cover; background-position: center;
  }
  .lock-screen::before {
    content: ''; position: absolute; inset: 0;
    background: rgba(30,20,35,0.7);
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  }
  .lock-content {
    position: relative; z-index: 1; text-align: center;
    padding: 20px; max-width: 360px; width: 100%;
  }
  .lock-sparkle { font-size: 10px; color: rgba(200,176,208,0.5); letter-spacing: 12px; margin-bottom: 20px; animation: pulse 3s ease-in-out infinite; }
  .lock-title {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: clamp(36px, 8vw, 56px); font-weight: 300;
    letter-spacing: 0.2em; color: rgba(232,228,223,0.9);
    margin-bottom: 8px;
  }
  .lock-sub {
    font-size: 12px; color: rgba(160,140,170,0.7);
    letter-spacing: 0.3em; margin-bottom: 40px;
    font-family: 'Cormorant Garamond', Georgia, serif;
    text-transform: uppercase;
  }
  .lock-input-wrap {
    position: relative; margin-bottom: 16px;
  }
  .lock-input {
    width: 100%; padding: 14px 18px; font-size: 15px;
    font-family: inherit; letter-spacing: 0.1em;
    background: rgba(255,252,248,0.08);
    border: 1px solid rgba(200,176,208,0.15);
    border-radius: 12px; color: rgba(232,228,223,0.9);
    outline: none; text-align: center;
    transition: all 0.3s;
  }
  .lock-input::placeholder { color: rgba(160,140,170,0.4); }
  .lock-input:focus {
    border-color: rgba(200,176,208,0.35);
    background: rgba(255,252,248,0.12);
    box-shadow: 0 0 30px rgba(140,90,160,0.08);
  }
  .lock-btn {
    width: 100%; padding: 14px; font-size: 14px;
    font-family: 'Cormorant Garamond', Georgia, serif;
    letter-spacing: 0.15em; text-transform: uppercase;
    background: rgba(200,176,208,0.12);
    border: 1px solid rgba(200,176,208,0.2);
    border-radius: 12px; color: rgba(232,228,223,0.8);
    cursor: pointer; transition: all 0.3s;
  }
  .lock-btn:hover {
    background: rgba(200,176,208,0.2);
    border-color: rgba(200,176,208,0.35);
  }
  .lock-error {
    font-size: 12px; color: rgba(200,120,120,0.8);
    margin-top: 12px; min-height: 18px; letter-spacing: 0.06em;
  }
  .lock-hint {
    font-size: 11px; color: rgba(160,140,170,0.35);
    margin-top: 24px; letter-spacing: 0.08em;
  }

  /* ─── Role badge ─── */
  .role-badge {
    position: fixed; top: 14px; right: 14px; z-index: 20;
    padding: 6px 14px; border-radius: 100px;
    font-size: 11px; letter-spacing: 0.08em;
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    cursor: pointer; transition: all 0.2s;
  }
  .role-badge.admin {
    background: rgba(140,90,160,0.12); color: #7a5090;
    border: 1px solid rgba(140,90,160,0.2);
  }
  .role-badge.visitor {
    background: rgba(160,140,170,0.08); color: #9a85a0;
    border: 1px solid rgba(160,140,170,0.15);
  }
  .role-badge:hover { opacity: 0.8; }

  /* ─── Glass ─── */
  .glass {
    background: rgba(255,252,248,0.72);
    border: 1px solid rgba(160,120,180,0.15);
    border-radius: 14px;
    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    box-shadow: 0 2px 20px rgba(100,60,120,0.06);
    transition: all 0.3s ease;
  }
  .glass:hover {
    border-color: rgba(140,90,160,0.22);
    background: rgba(255,252,248,0.82);
    box-shadow: 0 4px 24px rgba(100,60,120,0.1);
  }

  /* ─── Header ─── */
  .home-header { text-align: center; padding: 60px 0 36px; }
  .header-accent { width: 40px; height: 1px; background: linear-gradient(to right, transparent, rgba(140,90,160,0.35), transparent); margin: 0 auto 16px; }
  .brand-sub { font-size: 11px; letter-spacing: 0.35em; text-transform: uppercase; color: #9a85a0; margin-bottom: 10px; font-family: 'Cormorant Garamond', Georgia, serif; }
  .site-name { font-family: 'Cormorant Garamond', Georgia, serif; font-size: clamp(38px, 8vw, 64px); font-weight: 300; letter-spacing: 0.18em; margin: 0 0 10px; color: #3a2a3e; text-shadow: 0 2px 30px rgba(140,90,160,0.08); }
  .site-tagline { font-size: 14px; color: #9a85a0; letter-spacing: 0.2em; font-style: italic; margin-bottom: 16px; }
  .sparkle-row { display: flex; justify-content: center; gap: 16px; margin-bottom: 8px; }
  .sparkle { font-size: 10px; color: #c8b0d0; animation: float 3s ease-in-out infinite; }
  .sparkle:nth-child(2) { animation-delay: 0.5s; }
  .sparkle:nth-child(3) { animation-delay: 1s; }

  /* ─── Cards ─── */
  .home-cards { display: flex; flex-direction: column; gap: 14px; margin-top: 8px; }
  .home-card { padding: 20px 24px; cursor: pointer; position: relative; overflow: hidden; }
  .card-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .card-label { font-size: 16px; font-weight: 400; letter-spacing: 0.06em; color: #3a2a3e; }
  .card-count { font-size: 11px; color: #9a85a0; letter-spacing: 0.1em; }
  .card-arrow { position: absolute; right: 22px; top: 20px; font-size: 16px; color: #c0b0c8; transition: color 0.3s; }
  .home-card:hover .card-arrow { color: #7a5090; }
  .card-emoji { font-size: 22px; margin-right: 8px; vertical-align: middle; }
  .latest-preview { display: flex; align-items: center; gap: 12px; padding: 10px 12px; border-radius: 10px; background: rgba(140,90,160,0.04); }
  .preview-title { font-size: 13px; color: #5a4560; }
  .preview-date { font-size: 11px; color: #b0a0b5; margin-top: 2px; }
  .photo-strip { display: flex; gap: 8px; overflow: hidden; }
  .photo-strip img { width: 64px; height: 44px; object-fit: cover; border-radius: 6px; }
  .wish-preview-bar { margin-top: 10px; height: 4px; border-radius: 2px; background: rgba(140,90,160,0.08); overflow: hidden; }
  .wish-preview-fill { height: 100%; border-radius: 2px; background: linear-gradient(90deg, #b085c0, #d4a5e0); transition: width 0.6s ease; }
  .wish-preview-text { font-size: 12px; color: #b0a0b5; margin-top: 6px; }

  .home-footer { text-align: center; padding: 40px 0 20px; }
  .footer-line { width: 20px; height: 1px; background: rgba(140,90,160,0.2); margin: 0 auto 12px; }
  .footer-text { font-size: 12px; color: #b0a0b5; letter-spacing: 0.12em; }
  .footer-quote { font-size: 13px; color: #c0b0c8; font-style: italic; font-family: 'Cormorant Garamond', Georgia, serif; letter-spacing: 0.08em; margin-top: 8px; }

  /* ─── Sub header ─── */
  .sub-header { display: flex; align-items: center; justify-content: space-between; padding: 24px 0 16px; border-bottom: 1px solid rgba(140,90,160,0.1); margin-bottom: 24px; position: sticky; top: 0; background: rgba(245,240,235,0.75); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); z-index: 10; }
  .back-btn { background: none; border: none; font-size: 13px; color: #9a85a0; cursor: pointer; font-family: inherit; padding: 4px 0; transition: color 0.2s; }
  .back-btn:hover { color: #7a5090; }
  .sub-title { font-size: 19px; font-weight: 400; letter-spacing: 0.12em; font-family: 'Cormorant Garamond', Georgia, serif; color: #3a2a3e; }

  .fab { display: inline-block; background: rgba(140,90,160,0.1); color: #7a5090; border: 1px solid rgba(140,90,160,0.2); border-radius: 100px; padding: 10px 26px; font-size: 13px; font-family: inherit; cursor: pointer; letter-spacing: 0.08em; margin-bottom: 12px; margin-right: 8px; transition: all 0.25s; }
  .fab:hover { background: rgba(140,90,160,0.18); border-color: rgba(140,90,160,0.35); }

  /* ─── Forms ─── */
  .compose-card { padding: 26px; }
  .compose-row { display: flex; flex-wrap: wrap; align-items: center; gap: 12px; margin-bottom: 18px; }
  .date-input { font-family: inherit; font-size: 13px; padding: 7px 10px; border: 1px solid rgba(140,90,160,0.15); border-radius: 8px; background: rgba(255,252,248,0.6); color: #5a4560; }
  .mood-picker { display: flex; gap: 6px; flex-wrap: wrap; }
  .mood-option { font-size: 20px; cursor: pointer; transition: all 0.15s; opacity: 0.3; display: inline-block; }
  .mood-option.active { opacity: 1; transform: scale(1.3); }
  .input-field { width: 100%; font-family: inherit; font-size: 15px; padding: 12px 14px; border: 1px solid rgba(140,90,160,0.12); border-radius: 10px; background: rgba(255,252,248,0.5); color: #3a2a3e; outline: none; margin-bottom: 12px; letter-spacing: 0.02em; }
  .input-field::placeholder { color: #c0b0c8; }
  textarea.input-field { resize: vertical; line-height: 1.9; min-height: 160px; }
  select.input-field { appearance: auto; cursor: pointer; }
  .actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 16px; }
  .btn-solid { background: rgba(140,90,160,0.12); color: #7a5090; border: 1px solid rgba(140,90,160,0.25); border-radius: 10px; padding: 10px 28px; font-size: 14px; font-family: inherit; cursor: pointer; letter-spacing: 0.05em; transition: all 0.2s; }
  .btn-ghost { background: rgba(255,252,248,0.5); color: #8a7590; border: 1px solid rgba(140,90,160,0.12); border-radius: 10px; padding: 10px 20px; font-size: 14px; font-family: inherit; cursor: pointer; transition: all 0.2s; }
  .btn-danger { color: #a05050; }

  /* ─── Diary ─── */
  .diary-list { display: flex; flex-direction: column; gap: 10px; }
  .empty-hint { text-align: center; color: #b0a0b5; margin-top: 60px; font-size: 14px; letter-spacing: 0.1em; }
  .diary-card { display: flex; gap: 16px; padding: 18px 20px; cursor: pointer; animation: fadeInUp 0.45s ease both; }
  .diary-left { display: flex; flex-direction: column; align-items: center; gap: 4px; min-width: 48px; }
  .diary-mood { font-size: 22px; }
  .diary-date-small { font-size: 11px; color: #b0a0b5; white-space: nowrap; }
  .diary-title { font-size: 15px; font-weight: 400; margin: 0 0 4px; letter-spacing: 0.03em; color: #3a2a3e; }
  .diary-snippet { font-size: 13px; color: #8a7590; margin: 0; line-height: 1.7; }
  .detail-header { display: flex; align-items: center; gap: 16px; margin-bottom: 24px; padding-bottom: 20px; border-bottom: 1px solid rgba(120,80,140,0.12); }
  .detail-mood { font-size: 32px; }
  .detail-title { font-size: 22px; font-weight: 400; color: #3a2a3e; font-family: 'Noto Serif SC', Georgia, serif; letter-spacing: 0.04em; }
  .detail-date { font-size: 13px; color: #9a85a0; margin-top: 4px; }
  .detail-content { font-size: 15px; line-height: 2.1; color: #5a4560; white-space: pre-wrap; letter-spacing: 0.02em; }

  /* ─── Folders ─── */
  .folder-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 14px; margin-bottom: 20px; }
  .folder-card { padding: 20px 16px; cursor: pointer; text-align: center; animation: fadeInUp 0.4s ease both; }
  .folder-icon { font-size: 36px; margin-bottom: 8px; display: block; }
  .folder-name { font-size: 14px; color: #3a2a3e; letter-spacing: 0.04em; margin-bottom: 4px; }
  .folder-count { font-size: 11px; color: #b0a0b5; }
  .folder-actions { display: flex; gap: 6px; justify-content: center; margin-top: 8px; opacity: 0; transition: opacity 0.2s; }
  .folder-card:hover .folder-actions { opacity: 1; }
  .folder-action-btn { background: none; border: none; font-size: 11px; color: #9a85a0; cursor: pointer; padding: 2px 6px; transition: color 0.2s; }
  .folder-action-btn:hover { color: #7a5090; }
  .folder-action-btn.danger:hover { color: #a05050; }

  .drop-zone { border: 2px dashed rgba(140,90,160,0.25); border-radius: 14px; padding: 40px 20px; text-align: center; margin-bottom: 20px; transition: all 0.3s; cursor: pointer; background: rgba(255,252,248,0.3); }
  .drop-zone.drag-over { border-color: rgba(140,90,160,0.5); background: rgba(140,90,160,0.06); transform: scale(1.01); }
  .drop-icon { font-size: 32px; margin-bottom: 10px; display: block; color: #c0b0c8; }
  .drop-text { font-size: 14px; color: #9a85a0; letter-spacing: 0.06em; margin-bottom: 6px; }
  .drop-hint { font-size: 12px; color: #c0b0c8; }
  .upload-preview { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 16px; justify-content: center; }
  .upload-thumb { width: 60px; height: 60px; object-fit: cover; border-radius: 8px; border: 2px solid rgba(140,90,160,0.15); }

  .album-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 10px; }
  .album-item { position: relative; border-radius: 10px; overflow: hidden; cursor: pointer; aspect-ratio: 1; animation: fadeInUp 0.45s ease both; box-shadow: 0 2px 12px rgba(100,60,120,0.08); }
  .album-item img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.6s cubic-bezier(0.25,0.46,0.45,0.94); }
  .album-item:hover img { transform: scale(1.06); }
  .album-overlay { position: absolute; inset: 0; background: linear-gradient(0deg, rgba(50,30,60,0.55) 0%, transparent 55%); display: flex; align-items: flex-end; padding: 14px; opacity: 0; transition: opacity 0.35s; }
  .album-item:hover .album-overlay { opacity: 1; }
  .album-caption { color: rgba(255,255,255,0.9); font-size: 12px; letter-spacing: 0.06em; }

  .lightbox { position: fixed; inset: 0; z-index: 100; background: rgba(50,30,60,0.85); display: flex; justify-content: center; align-items: center; padding: 20px; backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
  .lightbox-inner { overflow: hidden; max-width: 540px; width: 100%; background: rgba(255,252,248,0.95); }
  .lightbox-inner img { width: 100%; max-height: 60vh; object-fit: contain; display: block; background: #f0ebe5; }
  .lightbox-info { padding: 18px 22px 10px; }
  .lightbox-caption { font-size: 17px; color: #3a2a3e; font-family: 'Noto Serif SC', Georgia, serif; }
  .lightbox-date { font-size: 12px; color: #9a85a0; margin-top: 4px; }

  /* ─── Wishes ─── */
  .wish-tabs { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
  .wish-tab { padding: 7px 16px; border-radius: 100px; font-size: 12px; font-family: inherit; cursor: pointer; letter-spacing: 0.06em; border: 1px solid rgba(140,90,160,0.15); background: rgba(255,252,248,0.4); color: #8a7590; transition: all 0.2s; }
  .wish-tab.active { background: rgba(140,90,160,0.12); color: #7a5090; border-color: rgba(140,90,160,0.3); }
  .wish-tab:hover { border-color: rgba(140,90,160,0.3); }
  .wish-list { display: flex; flex-direction: column; gap: 10px; }
  .wish-card { padding: 16px 20px; animation: fadeInUp 0.4s ease both; cursor: pointer; display: flex; gap: 14px; align-items: flex-start; }
  .wish-check { width: 22px; height: 22px; border-radius: 50%; border: 2px solid rgba(140,90,160,0.25); display: flex; align-items: center; justify-content: center; font-size: 12px; cursor: pointer; transition: all 0.2s; flex-shrink: 0; margin-top: 2px; }
  .wish-check.done { background: rgba(140,90,160,0.15); border-color: rgba(140,90,160,0.4); color: #7a5090; }
  .wish-body { flex: 1; min-width: 0; }
  .wish-title-row { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
  .wish-title { font-size: 15px; color: #3a2a3e; letter-spacing: 0.03em; }
  .wish-title.done-text { text-decoration: line-through; color: #b0a0b5; }
  .wish-cat-badge { font-size: 10px; padding: 2px 8px; border-radius: 100px; background: rgba(140,90,160,0.08); color: #9a85a0; letter-spacing: 0.06em; }
  .wish-note { font-size: 13px; color: #8a7590; line-height: 1.6; margin-top: 2px; }
  .wish-meta { display: flex; align-items: center; gap: 10px; margin-top: 6px; }
  .wish-stars { color: #d4a5e0; font-size: 13px; letter-spacing: 2px; }
  .wish-date { font-size: 11px; color: #c0b0c8; }
  .wish-deadline { font-size: 11px; color: #c09070; }
  .wish-progress-section { margin-bottom: 24px; }
  .wish-progress-label { font-size: 12px; color: #9a85a0; margin-bottom: 6px; letter-spacing: 0.08em; }
  .wish-progress-bar { height: 6px; border-radius: 3px; background: rgba(140,90,160,0.08); overflow: hidden; }
  .wish-progress-fill { height: 100%; border-radius: 3px; background: linear-gradient(90deg, #c090d0, #e0b0f0, #c090d0); background-size: 200% auto; animation: shimmer 3s linear infinite; transition: width 0.6s ease; }
  .wish-stats { display: flex; gap: 16px; margin-top: 8px; }
  .wish-stat { font-size: 12px; color: #b0a0b5; }
  .wish-stat strong { color: #7a5090; font-weight: 500; }
  .star-picker { display: flex; gap: 4px; }
  .star-pick { font-size: 22px; cursor: pointer; transition: all 0.15s; opacity: 0.25; }
  .star-pick.lit { opacity: 1; }

  .page { animation: fadeInUp 0.35s ease both; }
  .hidden { display: none !important; }

  .modal-overlay { position: fixed; inset: 0; z-index: 50; background: rgba(50,30,60,0.5); display: flex; justify-content: center; align-items: center; padding: 20px; backdrop-filter: blur(6px); }
  .modal-box { width: 100%; max-width: 380px; padding: 28px; background: rgba(255,252,248,0.97); }
  .modal-title { font-size: 18px; font-weight: 400; margin-bottom: 18px; letter-spacing: 0.06em; text-align: center; font-family: 'Cormorant Garamond', Georgia, serif; }

  /* admin-only elements hidden for visitors */
  .admin-only { display: none; }
  body.is-admin .admin-only { display: inline-block; }
  body.is-admin .admin-only-flex { display: flex; }
  body.is-admin .admin-only-block { display: block; }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(140,90,160,0.12); border-radius: 3px; }
</style>
</head>
<body>

<!-- Lock Screen -->
<div class="lock-screen" id="lock-screen">
  <div class="lock-content">
    <div class="lock-sparkle">✦ ✧ ✦</div>
    <h1 class="lock-title">TIRESIA</h1>
    <p class="lock-sub">Fragments of Light</p>
    <div class="lock-input-wrap">
      <input type="password" class="lock-input" id="lock-input" placeholder="请输入密码" autocomplete="off">
    </div>
    <button class="lock-btn" id="lock-btn">进入</button>
    <div class="lock-error" id="lock-error"></div>
    <div class="lock-hint">输入访客密码浏览 · 输入管理密码编辑</div>
  </div>
</div>

<div id="app"></div>

<script>
// ═══════════════════════════════════
// PASSWORD CONFIG — 修改这里设置你的密码
// ═══════════════════════════════════
const VISITOR_PASS = "tiresia";       // 访客密码（只能看）
const ADMIN_PASS = "tiresia2026";     // 管理密码（可以编辑）

// ─── Auth state ───
let isAdmin = false;
let isUnlocked = false;

// ─── Lock screen ───
const lockScreen = document.getElementById("lock-screen");
const lockInput = document.getElementById("lock-input");
const lockBtn = document.getElementById("lock-btn");
const lockError = document.getElementById("lock-error");

// Check session
const session = sessionStorage.getItem("tiresia_role");
if (session === "admin" || session === "visitor") {
  isUnlocked = true;
  isAdmin = session === "admin";
  lockScreen.style.display = "none";
  if (isAdmin) document.body.classList.add("is-admin");
  init();
}

lockBtn.onclick = tryUnlock;
lockInput.onkeydown = (e) => { if (e.key === "Enter") tryUnlock(); };

function tryUnlock() {
  const val = lockInput.value.trim();
  if (val === ADMIN_PASS) {
    isAdmin = true; isUnlocked = true;
    document.body.classList.add("is-admin");
    sessionStorage.setItem("tiresia_role", "admin");
    lockScreen.style.display = "none";
    init();
  } else if (val === VISITOR_PASS) {
    isAdmin = false; isUnlocked = true;
    document.body.classList.remove("is-admin");
    sessionStorage.setItem("tiresia_role", "visitor");
    lockScreen.style.display = "none";
    init();
  } else {
    lockError.textContent = "密码不正确，请重试";
    lockInput.value = "";
    lockInput.focus();
  }
}

function logout() {
  sessionStorage.removeItem("tiresia_role");
  isAdmin = false; isUnlocked = false;
  document.body.classList.remove("is-admin");
  lockScreen.style.display = "flex";
  lockInput.value = "";
  lockError.textContent = "";
  app.innerHTML = "";
}

// R2 API helpers
async function r2Fetch(path,opts={}){
  const headers={...opts.headers||{}};
  if(isAdmin) headers["X-Password"]=ADMIN_PASS;
  return fetch(API_URL+path,{...opts,headers});
}
async function r2ListFolders(){
  try{const r=await r2Fetch("/folders");return await r.json();}catch{return[];}
}
async function r2ListPhotos(folder){
  try{const r=await r2Fetch("/list/"+encodeURIComponent(folder));return await r.json();}catch{return[];}
}
async function r2Upload(folder,file){
  const name=uid()+"_"+file.name.replace(/[^a-zA-Z0-9._-]/g,"_");
  const key=encodeURIComponent(folder)+"/"+name;
  await r2Fetch("/upload/"+key,{method:"PUT",body:file,headers:{"Content-Type":file.type}});
  return{key:decodeURIComponent(key),url:R2_PUBLIC+"/"+key,name:file.name.replace(/\.[^.]+$/,"")};
}
async function r2Delete(key){
  await r2Fetch("/delete/"+encodeURIComponent(key),{method:"DELETE"});
}

  const grid=document.querySelector(".page");
  if(!grid)return;
  const loadingP=grid.querySelector("p");
  if(loadingP)loadingP.remove();

  const folderHTML=folderNames.length===0?'<p class="empty-hint" style="grid-column:1/-1">还没有相册，创建一个吧</p>':
    folderNames.map((name,i)=>`

        <button class="folder-action-btn danger delete-folder-btn" data-name="${name}">删除</button>
      </div>
    </div>`).join("");

  const gridDiv=document.createElement("div");
  gridDiv.className="folder-grid";
  gridDiv.innerHTML=folderHTML;
  grid.appendChild(gridDiv);

  document.querySelectorAll(".folder-card").forEach(el=>{
    el.onclick=(e)=>{if(e.target.classList.contains("rename-btn")||e.target.classList.contains("delete-folder-btn"))return;renderFolderPhotos(el.dataset.name);};
  });
  document.querySelectorAll(".rename-btn").forEach(el=>{
    el.onclick=(e)=>{e.stopPropagation();if(isAdmin)showFolderModal(el.dataset.name);};
  });
  document.querySelectorAll(".delete-folder-btn").forEach(el=>{
    el.onclick=async(e)=>{
      e.stopPropagation();if(!isAdmin)return;
      const name=el.dataset.name;
      if(!confirm(`确定删除「${name}」及其中所有照片？`))return;
      // Delete all photos in folder from R2
      const photos=await r2ListPhotos(name);
      for(const p of photos){await r2Delete(p.key);}
      folderNames=folderNames.filter(n=>n!==name);
      save(FOLDERS_META_KEY,folderNames);
      renderAlbumFolders();
    };
  });
}

function showFolderModal(editName){
  if(!isAdmin)return;
  const ov=document.createElement("div");ov.className="modal-overlay";
  ov.innerHTML=`<div class="glass modal-box" onclick="event.stopPropagation()"><div class="modal-title">${editName?"重命名相册":"新建相册"}</div><input class="input-field" id="fn" placeholder="例如：韩国旅行" value="${editName||""}"><div class="actions"><button class="btn-ghost" id="mc">取消</button><button class="btn-solid" id="mo">${editName?"保存":"创建"}</button></div></div>`;
  document.body.appendChild(ov);ov.onclick=()=>ov.remove();
  const inp=ov.querySelector("#fn");inp.focus();
  ov.querySelector("#mc").onclick=()=>ov.remove();
  ov.querySelector("#mo").onclick=()=>{
    const n=inp.value.trim();if(!n)return;
    if(editName){
      const idx=folderNames.indexOf(editName);
      if(idx>=0)folderNames[idx]=n;
    }else{
      if(!folderNames.includes(n))folderNames.push(n);
    }
    save(FOLDERS_META_KEY,folderNames);
    ov.remove();renderAlbumFolders();
  };
  inp.onkeydown=(e)=>{if(e.key==="Enter")ov.querySelector("#mo").click();};
}

async function renderFolderPhotos(folderName){
  app.innerHTML=`${roleBadge()}<div class="page">
    <div class="sub-header"><button class="back-btn" id="back">← 返回</button><h2 class="sub-title">${folderName}</h2><div style="width:60px"></div></div>
    ${isAdmin?`<div class="drop-zone" id="drop-zone"><span class="drop-icon">📷</span><div class="drop-text">拖拽照片到这里上传</div><div class="drop-hint">或者点击选择文件 · 照片存储在云端，不占浏览器空间</div><input type="file" id="file-input" accept="image/*" multiple style="display:none"><div class="upload-preview" id="upload-preview"></div></div>`:""}
    <div class="album-grid" id="album-grid"><p style="text-align:center;color:#b0a0b5;font-size:13px;grid-column:1/-1">加载中…</p></div>
  </div>`;
  bindRoleBadge();
  document.getElementById("back").onclick=renderAlbumFolders;

  // Load photos from R2
  const photos=await r2ListPhotos(folderName);
  const gridEl=document.getElementById("album-grid");

  if(photos.length===0){
    gridEl.innerHTML='<p class="empty-hint" style="grid-column:1/-1">还没有照片，拖拽上传吧</p>';
  }else{
    gridEl.innerHTML=photos.map((p,i)=>{
      const name=p.key.split("/").pop().replace(/^[a-z0-9]+_/,"").replace(/\.[^.]+$/,"").replace(/_/g," ");
      return`<div class="album-item" data-key="${p.key}" data-url="${p.url}" data-name="${name}" style="animation-delay:${i*0.05}s">
        <img src="${p.url}" alt="${name}" loading="lazy">
        <div class="album-overlay"><span class="album-caption">${name}</span></div>
      </div>`;
    }).join("");
  }

  // Setup drag & drop upload
  if(isAdmin){
    const dz=document.getElementById("drop-zone"),fi=document.getElementById("file-input"),pv=document.getElementById("upload-preview");
    dz.onclick=(e)=>{if(e.target===dz||e.target.classList.contains("drop-icon")||e.target.classList.contains("drop-text")||e.target.classList.contains("drop-hint"))fi.click();};
    dz.ondragover=(e)=>{e.preventDefault();dz.classList.add("drag-over");};
    dz.ondragleave=(e)=>{e.preventDefault();dz.classList.remove("drag-over");};
    dz.ondrop=async(e)=>{e.preventDefault();dz.classList.remove("drag-over");const fs=[...e.dataTransfer.files].filter(f=>f.type.startsWith("image/"));if(fs.length)await uploadFiles(fs,folderName);};
    fi.onchange=async()=>{const fs=[...fi.files].filter(f=>f.type.startsWith("image/"));if(fs.length)await uploadFiles(fs,folderName);};

    async function uploadFiles(files,folder){
      const dtxt=dz.querySelector(".drop-text");
      pv.innerHTML="";
      let done=0;
      for(const f of files){
        done++;
        dtxt.textContent=`上传中 ${done}/${files.length}…`;
        try{
          const result=await r2Upload(folder,f);
          const img=document.createElement("img");
          img.src=URL.createObjectURL(f);
          img.className="upload-thumb";
          pv.appendChild(img);
        }catch(err){console.error("Upload error:",err);}
      }
      dtxt.textContent=`✓ ${files.length} 张上传完成`;
      setTimeout(()=>renderFolderPhotos(folder),800);
    }
  }

  // Lightbox
  document.querySelectorAll(".album-item").forEach(el=>{
    el.onclick=()=>openLightbox(folderName,el.dataset.key,el.dataset.url,el.dataset.name);
  });
}

function openLightbox(folderName,key,url,name){
  const lb=document.createElement("div");lb.className="lightbox";
  lb.innerHTML=`<div class="glass lightbox-inner" onclick="event.stopPropagation()"><img src="${url}" alt="${name}"><div class="lightbox-info"><div class="lightbox-caption">${name}</div></div><div class="actions" style="padding:0 22px 18px"><button class="btn-ghost" id="lb-close">关闭</button>${isAdmin?'<button class="btn-ghost btn-danger" id="lb-del">删除</button>':""}</div></div>`;
  document.body.appendChild(lb);lb.onclick=()=>lb.remove();
  lb.querySelector("#lb-close").onclick=()=>lb.remove();
  const del=lb.querySelector("#lb-del");if(del)del.onclick=async()=>{await r2Delete(key);lb.remove();renderFolderPhotos(folderName);};
}

          <div class="wish-meta"><span class="wish-stars">${starsStr(w.stars)}</span><span class="wish-date">${fmtDate(w.date)}</span>${w.deadline?`<span class="wish-deadline">🎯 ${fmtDate(w.deadline)}</span>`:""}</div>
        </div>
      </div>`;}).join("")}
    </div></div>`;
  bindRoleBadge();
  document.getElementById("back").onclick=renderHome;
  const nw=document.getElementById("new-wish");if(nw)nw.onclick=renderWishCompose;
  document.querySelectorAll(".wish-tab").forEach(el=>{el.onclick=()=>renderWishes(el.dataset.cat);});
  document.querySelectorAll(".wish-check").forEach(el=>{el.onclick=(e)=>{e.stopPropagation();if(!isAdmin)return;const w=wishes.find(x=>x.id===el.dataset.id);if(w){w.done=!w.done;save(WISHES_KEY,wishes);renderWishes(filterCat);}};});
  document.querySelectorAll(".wish-card").forEach(el=>{el.onclick=(e)=>{if(e.target.classList.contains("wish-check"))return;renderWishDetail(el.dataset.id,filterCat);};});
}

function renderWishCompose(){
  if(!isAdmin)return;let stars=2;
  app.innerHTML=`${roleBadge()}<div class="page">
    <div class="sub-header"><button class="back-btn" id="back">← 返回</button><h2 class="sub-title">许一个愿望</h2><div style="width:60px"></div></div>
    <div class="glass compose-card">
      <input class="input-field" id="w-title" placeholder="你的心愿是…">
      <textarea class="input-field" id="w-note" placeholder="备注（可选）" style="min-height:80px"></textarea>
      <div class="compose-row">
        <select class="input-field" id="w-cat" style="width:auto;margin-bottom:0;padding:8px 12px;font-size:13px">${WISH_CATS.filter(c=>c.key!=="all").map(c=>`<option value="${c.key}">${c.emoji} ${c.label}</option>`).join("")}</select>
        <div class="star-picker">${[1,2,3].map(n=>`<span class="star-pick ${n<=2?"lit":""}" data-n="${n}">★</span>`).join("")}</div>
      </div>
      <div class="compose-row"><span style="font-size:13px;color:#9a85a0">目标日期</span><input type="date" class="date-input" id="w-dl" value=""></div>
      <div class="actions"><button class="btn-ghost" id="cancel">取消</button><button class="btn-solid" id="save">许愿 ✨</button></div>
    </div></div>`;
  bindRoleBadge();
  document.getElementById("back").onclick=()=>renderWishes();document.getElementById("cancel").onclick=()=>renderWishes();
  document.querySelectorAll(".star-pick").forEach(el=>{el.onclick=()=>{stars=parseInt(el.dataset.n);document.querySelectorAll(".star-pick").forEach((s,i)=>{s.classList.toggle("lit",i<stars);});};});
  document.getElementById("save").onclick=()=>{const t=document.getElementById("w-title").value.trim();if(!t)return;wishes=[{id:uid(),title:t,note:document.getElementById("w-note").value.trim(),cat:document.getElementById("w-cat").value,stars,done:false,date:today(),deadline:document.getElementById("w-dl").value},...wishes];save(WISHES_KEY,wishes);renderWishes();};
}

function renderWishDetail(id,fromCat){
  const w=wishes.find(x=>x.id===id);if(!w)return renderWishes();const cat=WISH_CATS.find(c=>c.key===w.cat);
  app.innerHTML=`${roleBadge()}<div class="page">
    <div class="sub-header"><button class="back-btn" id="back">← 返回</button><h2 class="sub-title">心愿详情</h2><div style="width:60px"></div></div>
    <div class="glass compose-card">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid rgba(140,90,160,0.1)">
        <span style="font-size:28px">${cat?cat.emoji:"✦"}</span>
        <div><div style="font-size:20px;color:#3a2a3e;${w.done?"text-decoration:line-through;color:#b0a0b5;":""}">${w.title}</div><div style="font-size:12px;color:#9a85a0;margin-top:4px">${cat?cat.label:""}　·　${fmtDate(w.date)}　·　<span class="wish-stars">${starsStr(w.stars)}</span></div></div>
      </div>
      ${w.note?`<p style="font-size:15px;line-height:2;color:#5a4560;margin-bottom:16px">${w.note}</p>`:""}
      ${w.deadline?`<p style="font-size:13px;color:#c09070;margin-bottom:16px">🎯 目标：${fmtDate(w.deadline)}</p>`:""}
      <p style="font-size:13px;color:#9a85a0;margin-bottom:8px">状态：${w.done?"✅ 已完成":"⏳ 进行中"}</p>
      <div class="actions">
        <button class="btn-ghost" id="back2">返回</button>
        ${isAdmin?`<button class="btn-solid" id="toggle">${w.done?"标为未完成":"完成 ✓"}</button><button class="btn-ghost btn-danger" id="delete">删除</button>`:""}
      </div>
    </div></div>`;
  bindRoleBadge();
  document.getElementById("back").onclick=()=>renderWishes(fromCat);document.getElementById("back2").onclick=()=>renderWishes(fromCat);
  const tog=document.getElementById("toggle");if(tog)tog.onclick=()=>{w.done=!w.done;save(WISHES_KEY,wishes);renderWishDetail(id,fromCat);};
  const del=document.getElementById("delete");if(del)del.onclick=()=>{wishes=wishes.filter(x=>x.id!==id);save(WISHES_KEY,wishes);renderWishes(fromCat);};
}

// ─── Start ───
async function init(){
  await refreshFolderCounts();
  renderHome();
}
if(isUnlocked) init();
</script>
</body>
</html>
